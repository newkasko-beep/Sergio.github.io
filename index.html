    input[type="date"] { color-scheme: dark; }

    #loading {

    const TYPE_META = {
      PULL:  { color: STRENGTH_COLOR, label: 'PULL',  symbol: '←', isStrength: true },
      PUSH:  { color: STRENGTH_COLOR, label: 'PUSH',  symbol: '→', isStrength: true },
      LEGS:  { color: STRENGTH_COLOR, label: 'LEGS',  symbol: '↓', isStrength: true },

      HIIT:  { color: CARDIO_COLOR,   label: 'HIIT',  symbol: '✺', isStrength: false },
      REST:  { color: REST_COLOR,     label: 'REST',  symbol: '○', isStrength: null }
    };

    const STORAGE_KEY = 'sxtraveler-90day-plan-done-v1';
    const START_DATE_KEY = 'sxtraveler-90day-plan-startdate-v1';

    // ===== PLAN GENERATOR =====
    function generate90DayPlan() {
      const PULL_SEQ  = ['P1','P2','P3','P4','P5','P6','P7','P8','P9','P10','P1','P2','P3'];
      const PUSH_SEQ  = ['PU1','PU2','PU3','PU4','PU5','PU6','PU7','PU8','PU9','PU10','PU11','PU12','PU13'];
      const LEGS_SEQ  = ['L1','L2','L3','L4','L5','L6'];
      const UPPER_SEQ = ['U1','U2','U3','U4','U5','U6','U7'];
      const HIIT_SEQ  = ['H1','H2','H3','H4','H5','H6','H7','H8','H9','H10','H11','H12','H13','H14','H15','H16','H17','H18','H19','H20','H21','H22','H23','H24','H25','H26','H27','H28','H29','H30','H31','H34','H35','H36','H37','H38','H39','H40','H41'];
      const DOW = ['MON','TUE','WED','THU','FRI','SAT','SUN'];

      let pI = 0, puI = 0, lI = 0, uI = 0, hI = 0;
      const plan = [];

      for (let day = 1; day <= 90; day++) {
        const week = Math.ceil(day / 7);
        const dow = DOW[(day - 1) % 7];
        let type = 'REST', videoId = null;

        if (dow === 'MON') { type = 'PULL'; videoId = PULL_SEQ[pI++]; }
        else if (dow === 'WED') { type = 'PUSH'; videoId = PUSH_SEQ[puI++]; }
        else if (dow === 'FRI') {
          if (week % 2 === 1) { type = 'UPPER'; videoId = UPPER_SEQ[uI++]; }
          else { type = 'LEGS'; videoId = LEGS_SEQ[lI++]; }
        }
        else if (dow === 'TUE' || dow === 'THU' || dow === 'SAT') { type = 'HIIT'; videoId = HIIT_SEQ[hI++]; }

        plan.push({ day, week, dow, type, videoId });
      }
      return plan;
    }

    // ===== DATE HELPERS =====
    function formatDate(startDateStr, dayOffset) {
      if (!startDateStr) return null;
      const d = new Date(startDateStr + 'T00:00:00');
      d.setDate(d.getDate() + dayOffset - 1);
      const dd = String(d.getDate()).padStart(2, '0');
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      return `${dd}.${mm}`;
    }

    // ===== MAIN COMPONENT =====
    function PlanApp() {
      const [done, setDone] = useState(new Set());
      const [startDate, setStartDate] = useState('');
      const plan = useMemo(() => generate90DayPlan(), []);

      useEffect(() => {
        try {
          const rawDone = localStorage.getItem(STORAGE_KEY);
          if (rawDone) setDone(new Set(JSON.parse(rawDone)));
          const sd = localStorage.getItem(START_DATE_KEY);
          if (sd) setStartDate(sd);
        } catch (e) {}
      }, []);

      const toggleDone = (day) => {
        const next = new Set(done);
        if (next.has(day)) next.delete(day); else next.add(day);
        setDone(next);
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify([...next])); } catch (e) {}
      };

      const handleStartDate = (v) => {
        setStartDate(v);
        try { localStorage.setItem(START_DATE_KEY, v); } catch (e) {}
      };

      const resetAll = () => {
        if (!confirm('Reset all progress? This cannot be undone.')) return;
        setDone(new Set());
        try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
      };

      const totalWorkouts = plan.filter(d => d.type !== 'REST').length;
      const doneWorkouts = plan.filter(d => d.type !== 'REST' && done.has(d.day)).length;
      const pct = (doneWorkouts / totalWorkouts) * 100;

      const doneStrength = plan.filter(d => TYPE_META[d.type].isStrength === true && done.has(d.day)).length;
      const totalStrength = plan.filter(d => TYPE_META[d.type].isStrength === true).length;
      const doneCardio = plan.filter(d => TYPE_META[d.type].isStrength === false && done.has(d.day)).length;
      const totalCardio = plan.filter(d => TYPE_META[d.type].isStrength === false).length;

      // group by week
      const weeks = {};
      plan.forEach(d => { if (!weeks[d.week]) weeks[d.week] = []; weeks[d.week].push(d); });

      return (
        <div className="grain" style={{ minHeight: '100vh', position: 'relative' }}>
          {/* HEADER */}
          <header style={{ borderBottom: '1px solid #1f1f1f', position: 'relative', zIndex: 2 }}>
            <div style={{ maxWidth: 1200, margin: '0 auto', padding: '24px 24px 16px' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: 20 }}>
                <div>
                  <div className="font-mono" style={{ fontSize: 11, color: '#666', letterSpacing: '0.15em', marginBottom: 8 }}>
                    S.X.TRAVELER / 90-DAY EXECUTION PLAN / 2026
                  </div>
                  <h1 className="font-display" style={{ fontSize: 'clamp(44px, 7vw, 88px)', lineHeight: 0.92, margin: 0, textTransform: 'uppercase' }}>
                    90<span style={{ color: '#333' }}>·</span>Day<br />
                    <span style={{ color: STRENGTH_COLOR }}>Train</span>
                    <span style={{ color: '#333' }}> / </span>
                    <span style={{ color: CARDIO_COLOR }}>Plan</span>
                  </h1>
                </div>
                <div style={{ display: 'flex', gap: 20, alignItems: 'flex-start', flexWrap: 'wrap' }}>
                  <Stat label="DAY" value={`${doneWorkouts}/${totalWorkouts}`} color="#f5f5f0" />
                  <Stat label="STRENGTH" value={`${doneStrength}/${totalStrength}`} color={STRENGTH_COLOR} />
                  <Stat label="CARDIO" value={`${doneCardio}/${totalCardio}`} color={CARDIO_COLOR} />
                </div>
              </div>

              <div style={{ marginTop: 28 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6, flexWrap: 'wrap', gap: 8 }}>
                  <span className="font-mono" style={{ fontSize: 10, color: '#666', letterSpacing: '0.15em' }}>EXECUTION PROGRESS</span>
                  <span className="font-mono" style={{ fontSize: 10, color: '#c5ff00', letterSpacing: '0.1em' }}>{pct.toFixed(1)}%</span>
                </div>
                <div style={{ height: 3, background: '#1a1a1a', position: 'relative', display: 'flex' }}>
                  <div style={{ height: '100%', width: `${(doneStrength / totalWorkouts) * 100}%`, background: STRENGTH_COLOR, transition: 'width 0.5s ease' }} />
                  <div style={{ height: '100%', width: `${(doneCardio / totalWorkouts) * 100}%`, background: CARDIO_COLOR, transition: 'width 0.5s ease' }} />
                </div>
              </div>

              <div style={{ marginTop: 20, display: 'flex', gap: 16, alignItems: 'center', flexWrap: 'wrap' }}>
                <div>
                  <label className="font-mono" style={{ fontSize: 10, color: '#666', letterSpacing: '0.2em', display: 'block', marginBottom: 4 }}>
                    START DATE (OPTIONAL)
                  </label>
                  <input type="date" value={startDate} onChange={e => handleStartDate(e.target.value)} className="font-mono"
                    style={{ background: '#111', border: '1px solid #2a2a2a', color: '#f5f5f0', padding: '6px 10px', fontSize: 12, letterSpacing: '0.05em' }} />
                </div>
                {done.size > 0 && (
                  <button onClick={resetAll} className="font-mono"
                    style={{ background: 'transparent', border: '1px solid #2a2a2a', color: '#666', padding: '8px 14px', fontSize: 10, letterSpacing: '0.2em', cursor: 'pointer', alignSelf: 'flex-end' }}>
                    RESET ALL
                  </button>
                )}
                <div className="font-mono" style={{ fontSize: 10, color: '#444', letterSpacing: '0.15em', alignSelf: 'flex-end', flex: 1, textAlign: 'right' }}>
                  MON–SAT TRAINING · SUN REST
                </div>
              </div>
            </div>
          </header>

          {/* WEEKS */}
          <main style={{ maxWidth: 1200, margin: '0 auto', padding: '32px 24px 80px', position: 'relative', zIndex: 2 }}>
            {Object.keys(weeks).map(wk => (
              <WeekBlock key={wk} week={Number(wk)} days={weeks[wk]} done={done} toggleDone={toggleDone} startDate={startDate} />
            ))}
          </main>

          <footer style={{ borderTop: '1px solid #1f1f1f', padding: '24px', position: 'relative', zIndex: 2 }}>
            <div style={{ maxWidth: 1200, margin: '0 auto', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 12 }}>
              <div className="font-mono" style={{ fontSize: 10, color: '#444', letterSpacing: '0.2em' }}>
                SOURCES: @TIFFXDAN · @DANTHEHIITMAN
              </div>
              <div className="font-mono" style={{ fontSize: 10, color: '#444', letterSpacing: '0.2em', display: 'flex', alignItems: 'center', gap: 12 }}>
                <span style={{ color: STRENGTH_COLOR }}>STRENGTH</span>
                <span>×</span>
                <span style={{ color: CARDIO_COLOR }}>CARDIO</span>
                <span>/ ALTERNATING</span>
              </div>
            </div>
          </footer>
        </div>
      );
    }

    function Stat({ label, value, color }) {
      return (
        <div style={{ minWidth: 80 }}>
          <div className="font-display" style={{ fontSize: 30, lineHeight: 1, color }}>{value}</div>
          <div className="font-mono" style={{ fontSize: 9, color: '#666', letterSpacing: '0.2em', marginTop: 4 }}>{label}</div>
        </div>
      );
    }

    function WeekBlock({ week, days, done, toggleDone, startDate }) {
      const weekDone = days.filter(d => d.type !== 'REST' && done.has(d.day)).length;
      const weekTotal = days.filter(d => d.type !== 'REST').length;
      const isLegWeek = week % 2 === 0;
      const weekLabel = isLegWeek ? 'LEGS WEEK' : 'UPPER WEEK';
      const weekColor = weekDone === weekTotal ? '#c5ff00' : '#555';

      return (
        <section style={{ marginBottom: 32, border: '1px solid #1a1a1a', background: '#0f0f0f' }}>
          {/* Week header */}
          <div style={{ padding: '14px 18px', borderBottom: '1px solid #1a1a1a', display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 12, flexWrap: 'wrap' }}>
            <div style={{ display: 'flex', alignItems: 'baseline', gap: 14 }}>
              <span className="font-display" style={{ fontSize: 28, letterSpacing: '0.02em' }}>
                WEEK <span style={{ color: weekColor }}>{String(week).padStart(2, '0')}</span>
              </span>
              <span className="font-mono" style={{ fontSize: 10, color: '#555', letterSpacing: '0.2em' }}>
                {weekLabel} · {weekDone}/{weekTotal} DONE
              </span>
            </div>
          </div>

          {/* Desktop table header */}
          <div className="plan-row-desktop font-mono" style={{ background: '#0a0a0a', borderBottom: '1px solid #1a1a1a', fontSize: 9, color: '#555', letterSpacing: '0.2em', padding: '8px 14px' }}>
            <div>DAY</div>
            <div>DATE</div>
            <div>TYPE</div>
            <div>WORKOUT</div>
            <div style={{ textAlign: 'center' }}>MIN</div>
            <div style={{ textAlign: 'center' }}>WATCH</div>
            <div style={{ textAlign: 'center' }}>DONE</div>
          </div>

          {/* Rows */}
          <div>
            {days.map((d, idx) => (
              <PlanRow key={d.day} d={d} done={done.has(d.day)} onToggle={() => toggleDone(d.day)} startDate={startDate} delay={idx * 15} />
            ))}
          </div>
        </section>
      );
    }

    function PlanRow({ d, done, onToggle, startDate, delay }) {
      const meta = TYPE_META[d.type];
      const isRest = d.type === 'REST';
      const video = d.videoId ? VIDEOS[d.videoId] : null;
      const dateStr = formatDate(startDate, d.day);
      const opacity = isRest ? 0.45 : (done ? 0.6 : 1);

      return (
        <div className="row-enter" style={{ animationDelay: `${delay}ms`, opacity }}>
          {/* DESKTOP */}
          <div className="plan-row-desktop" style={{ background: isRest ? '#0b0b0b' : '#0f0f0f' }}>
            <div className="font-mono" style={{ fontSize: 12, color: '#f5f5f0', fontWeight: 600 }}>
              <span style={{ color: '#666' }}>D</span>{String(d.day).padStart(2, '0')}
              <span style={{ color: '#333', margin: '0 6px' }}>·</span>
              <span style={{ color: '#666', fontSize: 10 }}>{d.dow}</span>
            </div>
            <div className="font-mono" style={{ fontSize: 11, color: dateStr ? '#888' : '#333', letterSpacing: '0.05em' }}>
              {dateStr || '—'}
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
              {isRest ? <MoonIcon size={11} style={{ color: meta.color }} /> : (meta.isStrength ? <DumbbellIcon size={11} style={{ color: meta.color }} /> : <FlameIcon size={11} style={{ color: meta.color }} />)}
              <span className="font-mono" style={{ fontSize: 10, color: meta.color, letterSpacing: '0.15em', fontWeight: 700 }}>
                {meta.label}
              </span>
            </div>
            <div className="font-narrow" style={{ fontSize: 14, color: isRest ? '#555' : '#f5f5f0', lineHeight: 1.3, textDecoration: done ? 'line-through' : 'none', textDecorationColor: meta.color }}>
              {isRest ? 'Recovery day — rest, sleep, stretch, walk.' : (video ? `${d.videoId} · ${video.title}` : '—')}
            </div>
            <div className="font-mono" style={{ fontSize: 11, color: '#888', textAlign: 'center' }}>
              {video ? video.dur : '—'}
            </div>
            <div style={{ textAlign: 'center' }}>
              {video ? (
                <a href={video.url} target="_blank" rel="noopener noreferrer" className="font-mono"
                  style={{ display: 'inline-flex', alignItems: 'center', gap: 4, background: 'transparent', border: `1px solid ${meta.color}`, color: meta.color, padding: '5px 10px', fontSize: 10, letterSpacing: '0.15em', fontWeight: 700, textDecoration: 'none', transition: 'all 0.15s ease' }}
                  onMouseEnter={e => { e.currentTarget.style.background = meta.color; e.currentTarget.style.color = '#0a0a0a'; }}
                  onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = meta.color; }}>
                  <PlayIcon size={9} /> GO
                </a>
              ) : <span style={{ color: '#333', fontSize: 10 }}>—</span>}
            </div>
            <div style={{ textAlign: 'center' }}>
              {!isRest && (
                <button onClick={onToggle} className="font-mono"
                  style={{ background: done ? meta.color : 'transparent', border: `1px solid ${done ? meta.color : '#2a2a2a'}`, color: done ? '#0a0a0a' : '#666', padding: '5px 9px', fontSize: 10, letterSpacing: '0.1em', fontWeight: 700, cursor: 'pointer', transition: 'all 0.15s ease', minWidth: 50 }}>
                  {done ? '✓' : '○'}
                </button>
              )}
            </div>
          </div>

          {/* MOBILE */}
          <div className="plan-row-mobile" style={{ background: isRest ? '#0b0b0b' : '#0f0f0f' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <span className="font-mono" style={{ fontSize: 13, color: '#f5f5f0', fontWeight: 700 }}>
                  <span style={{ color: '#666' }}>D</span>{String(d.day).padStart(2, '0')}
                </span>
                <span className="font-mono" style={{ fontSize: 10, color: '#666' }}>{d.dow}</span>
                {dateStr && <span className="font-mono" style={{ fontSize: 10, color: '#888' }}>· {dateStr}</span>}
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                {isRest ? <MoonIcon size={10} style={{ color: meta.color }} /> : (meta.isStrength ? <DumbbellIcon size={10} style={{ color: meta.color }} /> : <FlameIcon size={10} style={{ color: meta.color }} />)}
                <span className="font-mono" style={{ fontSize: 10, color: meta.color, letterSpacing: '0.15em', fontWeight: 700 }}>{meta.label}</span>
              </div>
            </div>
            <div className="font-narrow" style={{ fontSize: 14, color: isRest ? '#555' : '#f5f5f0', lineHeight: 1.35, marginBottom: 12, textDecoration: done ? 'line-through' : 'none', textDecorationColor: meta.color }}>
              {isRest ? 'Recovery day — rest, sleep, stretch, walk.' : (video ? `${d.videoId} · ${video.title}` : '—')}
            </div>
            {!isRest && video && (
              <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                <a href={video.url} target="_blank" rel="noopener noreferrer" className="font-mono"
                  style={{ flex: 1, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 6, background: 'transparent', border: `1px solid ${meta.color}`, color: meta.color, padding: '8px 12px', fontSize: 10, letterSpacing: '0.15em', fontWeight: 700, textDecoration: 'none' }}>
                  <PlayIcon size={10} /> WATCH · {video.dur}min
                </a>
                <button onClick={onToggle} className="font-mono"
                  style={{ background: done ? meta.color : 'transparent', border: `1px solid ${done ? meta.color : '#2a2a2a'}`, color: done ? '#0a0a0a' : '#666', padding: '8px 14px', fontSize: 10, letterSpacing: '0.15em', fontWeight: 700, cursor: 'pointer' }}>
                  {done ? '✓ DONE' : '○ MARK'}
                </button>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ===== MOUNT =====
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PlanApp />);
    document.getElementById('loading').classList.add('hidden');
  </script>
</body>
</html>
