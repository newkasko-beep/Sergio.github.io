    const CATEGORY_META = {
      ALL:   { label: 'ALL',   type: 'all',      color: '#f5f5f0',     symbol: '◉' },
      PULL:  { label: 'PULL',  type: 'strength', color: STRENGTH_COLOR, symbol: '←' },
      PUSH:  { label: 'PUSH',  type: 'strength', color: STRENGTH_COLOR, symbol: '→' },
      LEGS:  { label: 'LEGS',  type: 'strength', color: STRENGTH_COLOR, symbol: '↓' },
      HIIT:  { label: 'HIIT',  type: 'cardio',   color: CARDIO_COLOR,   symbol: '✺' },
      UPPER: { label: 'UPPER', type: 'strength', color: STRENGTH_COLOR, symbol: '⇅' }
    };

    const TYPE_FILTERS = [
      { key: 'ALL',      label: 'ALL',      color: '#f5f5f0',     symbol: '◉' },
      { key: 'STRENGTH', label: 'STRENGTH', color: STRENGTH_COLOR, symbol: '▣' },
      { key: 'CARDIO',   label: 'CARDIO',   color: CARDIO_COLOR,   symbol: '✺' }
    ];

    const STORAGE_KEY = 'sxtraveler-training-library-watched-v1';

    // ======= MAIN COMPONENT =======
    function TrainingLibrary() {
      const [activeType, setActiveType] = useState('ALL');
      const [activeCategory, setActiveCategory] = useState('ALL');
      const [activeDuration, setActiveDuration] = useState('ALL');
      const [search, setSearch] = useState('');
      const [watched, setWatched] = useState(new Set());
      const [copiedId, setCopiedId] = useState(null);

      // Load from localStorage
      useEffect(() => {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) {
            const arr = JSON.parse(raw);
            setWatched(new Set(arr));
          }
        } catch (e) { /* first run or blocked localStorage */ }
      }, []);

      const persist = (newSet) => {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify([...newSet]));
        } catch (e) { console.error('localStorage error:', e); }
      };

      const toggleWatched = (id) => {
        const next = new Set(watched);
        if (next.has(id)) next.delete(id); else next.add(id);
        setWatched(next);
        persist(next);
      };

      const clearAll = () => {
        setWatched(new Set());
        try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
      };

      const copyUrl = async (id, url) => {
        try {
          await navigator.clipboard.writeText(url);
          setCopiedId(id);
          setTimeout(() => setCopiedId(null), 1200);
        } catch (e) {
          // Fallback for older browsers / non-HTTPS
          const ta = document.createElement('textarea');
          ta.value = url; ta.style.position = 'fixed'; ta.style.opacity = '0';
          document.body.appendChild(ta); ta.select();
          try { document.execCommand('copy'); setCopiedId(id); setTimeout(() => setCopiedId(null), 1200); } catch (err) {}
          document.body.removeChild(ta);
        }
      };

      const counts = useMemo(() => {
        const c = { ALL: VIDEOS.length, PULL: 0, PUSH: 0, LEGS: 0, HIIT: 0, UPPER: 0, STRENGTH: 0, CARDIO: 0 };
        VIDEOS.forEach(v => {
          c[v.category] = (c[v.category] || 0) + 1;
          const t = CATEGORY_META[v.category].type;
          if (t === 'strength') c.STRENGTH++;
          if (t === 'cardio') c.CARDIO++;
        });
        return c;
      }, []);

      const filtered = useMemo(() => VIDEOS.filter(v => {
        const catType = CATEGORY_META[v.category].type;
        const mType = activeType === 'ALL'
          || (activeType === 'STRENGTH' && catType === 'strength')
          || (activeType === 'CARDIO' && catType === 'cardio');
        const mCat = activeCategory === 'ALL' || v.category === activeCategory;
        const mDur = activeDuration === 'ALL' || v.duration === Number(activeDuration);
        const mSearch = !search || v.title.toLowerCase().includes(search.toLowerCase()) || v.id.toLowerCase().includes(search.toLowerCase());
        return mType && mCat && mDur && mSearch;
      }), [activeType, activeCategory, activeDuration, search]);

      const visibleCategories = useMemo(() => {
        if (activeType === 'ALL') return ['ALL', 'PULL', 'PUSH', 'LEGS', 'HIIT', 'UPPER'];
        if (activeType === 'STRENGTH') return ['ALL', 'PULL', 'PUSH', 'LEGS', 'UPPER'];
        if (activeType === 'CARDIO') return ['ALL', 'HIIT'];
        return ['ALL'];
      }, [activeType]);

      useEffect(() => {
        if (!visibleCategories.includes(activeCategory)) setActiveCategory('ALL');
      }, [visibleCategories, activeCategory]);

      const watchedMinutes = VIDEOS.filter(v => watched.has(v.id)).reduce((s, v) => s + v.duration, 0);
      const watchedStrength = VIDEOS.filter(v => watched.has(v.id) && CATEGORY_META[v.category].type === 'strength').length;
      const watchedCardio = VIDEOS.filter(v => watched.has(v.id) && CATEGORY_META[v.category].type === 'cardio').length;

      return (
        <div className="grain" style={{ minHeight: '100vh', position: 'relative' }}>
          {/* HEADER */}
          <header style={{ borderBottom: '1px solid #1f1f1f', position: 'relative', zIndex: 2 }}>
            <div style={{ maxWidth: 1280, margin: '0 auto', padding: '24px 24px 16px' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: 20 }}>
                <div>
                  <div className="font-mono" style={{ fontSize: 11, color: '#666', letterSpacing: '0.15em', marginBottom: 8 }}>
                    S.X.TRAVELER / PERSONAL TRAINING SYSTEM / 2026
                  </div>
                  <h1 className="font-display" style={{ fontSize: 'clamp(44px, 7vw, 88px)', lineHeight: 0.92, margin: 0, textTransform: 'uppercase' }}>
                    Training<br />
                    <span style={{ color: STRENGTH_COLOR }}>Library</span>
                    <span style={{ color: '#333' }}> / </span>
                    <span style={{ color: CARDIO_COLOR }}>90D</span>
                  </h1>
                </div>
                <div style={{ display: 'flex', gap: 20, alignItems: 'flex-start', flexWrap: 'wrap' }}>
                  <Stat label="VIDEOS" value={VIDEOS.length} />
                  <Stat label="STRENGTH" value={counts.STRENGTH} color={STRENGTH_COLOR} />
                  <Stat label="CARDIO" value={counts.CARDIO} color={CARDIO_COLOR} />
                  <Stat label="WATCHED" value={watched.size} accent />
                  <Stat label="MIN DONE" value={watchedMinutes} accent />
                </div>
              </div>
              <div style={{ marginTop: 28 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
                  <span className="font-mono" style={{ fontSize: 10, color: '#666', letterSpacing: '0.15em' }}>PROGRESS</span>
                  <span className="font-mono" style={{ fontSize: 10, letterSpacing: '0.1em' }}>
                    <span style={{ color: STRENGTH_COLOR }}>S {watchedStrength}/{counts.STRENGTH}</span>
                    <span style={{ color: '#333', margin: '0 10px' }}>·</span>
                    <span style={{ color: CARDIO_COLOR }}>C {watchedCardio}/{counts.CARDIO}</span>
                  </span>
                </div>
                <div style={{ height: 3, background: '#1a1a1a', position: 'relative', display: 'flex' }}>
                  <div style={{ height: '100%', width: `${(watchedStrength / counts.STRENGTH) * (counts.STRENGTH / VIDEOS.length) * 100}%`, background: STRENGTH_COLOR, transition: 'width 0.5s ease' }} />
                  <div style={{ height: '100%', width: `${(watchedCardio / counts.CARDIO) * (counts.CARDIO / VIDEOS.length) * 100}%`, background: CARDIO_COLOR, transition: 'width 0.5s ease' }} />
                </div>
              </div>
            </div>
          </header>

          {/* TYPE TOGGLE */}
          <div style={{ borderBottom: '1px solid #1f1f1f', position: 'relative', zIndex: 2 }}>
            <div style={{ maxWidth: 1280, margin: '0 auto', padding: '14px 24px', display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap' }}>
              <span className="font-mono" style={{ fontSize: 10, color: '#555', letterSpacing: '0.2em', marginRight: 8 }}>TYPE /</span>
              {TYPE_FILTERS.map(tf => {
                const active = activeType === tf.key;
                const count = tf.key === 'ALL' ? counts.ALL : counts[tf.key];
                return (
                  <button key={tf.key} onClick={() => setActiveType(tf.key)} className="font-display"
                    style={{ background: active ? tf.color : 'transparent', color: active ? '#0a0a0a' : tf.color, border: `1px solid ${tf.color}`, padding: '10px 22px', fontSize: 22, letterSpacing: '0.08em', fontWeight: 400, cursor: 'pointer', textTransform: 'uppercase', transition: 'all 0.15s ease', display: 'flex', alignItems: 'center', gap: 10 }}>
                    <span style={{ fontSize: 16 }}>{tf.symbol}</span>
                    {tf.label}
                    <span className="font-mono" style={{ fontSize: 10, opacity: 0.7, letterSpacing: '0.1em' }}>[{count}]</span>
                  </button>
                );
              })}
            </div>
          </div>

          {/* SUB-FILTERS */}
          <div style={{ position: 'sticky', top: 0, background: 'rgba(10,10,10,0.95)', backdropFilter: 'blur(12px)', borderBottom: '1px solid #1f1f1f', zIndex: 10 }}>
            <div style={{ maxWidth: 1280, margin: '0 auto', padding: '14px 24px', display: 'flex', gap: 12, alignItems: 'center', flexWrap: 'wrap' }}>
              <div className="scroll-track" style={{ display: 'flex', gap: 6, overflowX: 'auto', flex: '1 1 auto', minWidth: 260 }}>
                {visibleCategories.map(cat => {
                  const active = activeCategory === cat;
                  const meta = CATEGORY_META[cat];
                  const catColor = meta.color;
                  return (
                    <button key={cat} onClick={() => setActiveCategory(cat)} className="font-mono"
                      style={{ background: active ? catColor : 'transparent', color: active ? '#0a0a0a' : '#f5f5f0', border: `1px solid ${active ? catColor : '#2a2a2a'}`, padding: '8px 14px', fontSize: 11, letterSpacing: '0.15em', fontWeight: 700, cursor: 'pointer', whiteSpace: 'nowrap', transition: 'all 0.15s ease' }}>
                      {meta.symbol} {cat}
                      <span style={{ marginLeft: 8, opacity: 0.6, fontWeight: 400 }}>[{counts[cat]}]</span>
                    </button>
                  );
                })}
              </div>
              <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
                {['ALL', '20', '25', '30'].map(dur => {
                  const active = activeDuration === dur;
                  return (
                    <button key={dur} onClick={() => setActiveDuration(dur)} className="font-mono"
                      style={{ background: active ? '#f5f5f0' : 'transparent', color: active ? '#0a0a0a' : '#888', border: `1px solid ${active ? '#f5f5f0' : '#2a2a2a'}`, padding: '8px 10px', fontSize: 10, letterSpacing: '0.1em', fontWeight: 700, cursor: 'pointer', whiteSpace: 'nowrap', transition: 'all 0.15s ease' }}>
                      {dur === 'ALL' ? 'ANY' : `${dur}m`}
                    </button>
                  );
                })}
              </div>
              <div style={{ position: 'relative', flex: '0 1 220px' }}>
                <SearchIcon size={14} style={{ position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)', color: '#666' }} />
                <input type="text" value={search} onChange={e => setSearch(e.target.value)} placeholder="search title or id..." className="font-mono"
                  style={{ width: '100%', background: '#111', border: '1px solid #2a2a2a', color: '#f5f5f0', padding: '9px 32px 9px 34px', fontSize: 12, outline: 'none', letterSpacing: '0.05em' }} />
                {search && (
                  <button onClick={() => setSearch('')} style={{ position: 'absolute', right: 8, top: '50%', transform: 'translateY(-50%)', background: 'none', border: 'none', color: '#666', cursor: 'pointer' }}>
                    <XIcon size={14} />
                  </button>
                )}
              </div>
              {watched.size > 0 && (
                <button onClick={clearAll} className="font-mono"
                  style={{ background: 'transparent', border: '1px solid #2a2a2a', color: '#666', padding: '8px 12px', fontSize: 10, letterSpacing: '0.15em', cursor: 'pointer' }}>
                  RESET
                </button>
              )}
            </div>
          </div>

          {/* GRID */}
          <main style={{ maxWidth: 1280, margin: '0 auto', padding: '32px 24px 80px', position: 'relative', zIndex: 2 }}>
            {filtered.length === 0 ? (
              <div className="font-mono" style={{ textAlign: 'center', color: '#666', padding: '80px 0', fontSize: 12, letterSpacing: '0.1em' }}>
                NO RESULTS · TRY ANOTHER FILTER
              </div>
            ) : (
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(320px, 1fr))', gap: 16 }}>
                {filtered.map((video, idx) => (
                  <VideoCard key={video.id} video={video} watched={watched.has(video.id)}
                    onToggle={() => toggleWatched(video.id)} onCopy={() => copyUrl(video.id, video.url)}
                    copied={copiedId === video.id} delay={Math.min(idx * 20, 400)} />
                ))}
              </div>
            )}
          </main>

          {/* FOOTER */}
          <footer style={{ borderTop: '1px solid #1f1f1f', padding: '24px', position: 'relative', zIndex: 2 }}>
            <div style={{ maxWidth: 1280, margin: '0 auto', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 12 }}>
              <div className="font-mono" style={{ fontSize: 10, color: '#444', letterSpacing: '0.2em' }}>
                SOURCES: @TIFFXDAN · @DANTHEHIITMAN
              </div>
              <div className="font-mono" style={{ fontSize: 10, color: '#444', letterSpacing: '0.2em', display: 'flex', alignItems: 'center', gap: 12 }}>
                <span style={{ color: STRENGTH_COLOR }}>STRENGTH</span>
                <span>×</span>
                <span style={{ color: CARDIO_COLOR }}>CARDIO</span>
                <span>/ ALTERNATING ROTATION</span>
              </div>
            </div>
          </footer>
        </div>
      );
    }

    function Stat({ label, value, accent, color }) {
      const valueColor = color || (accent ? '#c5ff00' : '#f5f5f0');
      return (
        <div style={{ minWidth: 70 }}>
          <div className="font-display" style={{ fontSize: 36, lineHeight: 1, color: valueColor }}>{value}</div>
          <div className="font-mono" style={{ fontSize: 9, color: '#666', letterSpacing: '0.2em', marginTop: 4 }}>{label}</div>
        </div>
      );
    }

    function VideoCard({ video, watched, onToggle, onCopy, copied, delay }) {
      const meta = CATEGORY_META[video.category];
      const accentColor = meta.color;
      const accentTintBg = meta.type === 'cardio' ? 'rgba(255, 74, 26, 0.08)' : 'rgba(197, 255, 0, 0.08)';
      const accentTintBorder = meta.type === 'cardio' ? 'rgba(255, 74, 26, 0.25)' : 'rgba(197, 255, 0, 0.2)';

      return (
        <div className="card-enter"
          style={{ background: '#111', border: `1px solid ${watched ? accentColor : '#1f1f1f'}`, padding: 18, display: 'flex', flexDirection: 'column', minHeight: 200, animationDelay: `${delay}ms`, position: 'relative', opacity: watched ? 0.7 : 1, transition: 'all 0.2s ease' }}
          onMouseEnter={e => { if (!watched) e.currentTarget.style.borderColor = accentColor; e.currentTarget.style.transform = 'translateY(-2px)'; }}
          onMouseLeave={e => { if (!watched) e.currentTarget.style.borderColor = '#1f1f1f'; e.currentTarget.style.transform = 'translateY(0)'; }}>
          {meta.type === 'cardio' && (
            <div style={{ position: 'absolute', left: 0, top: 0, bottom: 0, width: 3, background: accentColor }} />
          )}
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 14 }}>
            <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
              <span className="font-mono" style={{ fontSize: 10, fontWeight: 700, color: accentColor, background: accentTintBg, padding: '3px 7px', letterSpacing: '0.1em', border: `1px solid ${accentTintBorder}` }}>
                {video.id}
              </span>
              <span className="font-mono" style={{ fontSize: 10, color: '#888', letterSpacing: '0.15em', fontWeight: 600, display: 'flex', alignItems: 'center', gap: 5 }}>
                {meta.type === 'cardio' ? <FlameIcon size={10} style={{ color: accentColor }} /> : <DumbbellIcon size={10} />}
                {video.category}
              </span>
            </div>
            <span className="font-mono" style={{ fontSize: 11, color: '#f5f5f0', fontWeight: 600 }}>
              {video.duration}<span style={{ color: '#666' }}>min</span>
            </span>
          </div>
          <h3 className="font-narrow" style={{ fontSize: 15, lineHeight: 1.3, margin: 0, marginBottom: 18, flex: 1, color: '#f5f5f0', fontWeight: 500, textDecoration: watched ? 'line-through' : 'none', textDecorationColor: accentColor }}>
            {video.title}
          </h3>
          <div style={{ display: 'flex', gap: 6, borderTop: '1px solid #1f1f1f', paddingTop: 12 }}>
            <a href={video.url} target="_blank" rel="noopener noreferrer" className="font-mono"
              style={{ flex: 1, background: '#0a0a0a', border: '1px solid #2a2a2a', color: '#f5f5f0', padding: '8px 10px', fontSize: 10, letterSpacing: '0.15em', fontWeight: 700, textDecoration: 'none', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6, cursor: 'pointer', transition: 'all 0.15s ease' }}
              onMouseEnter={e => { e.currentTarget.style.background = accentColor; e.currentTarget.style.color = '#0a0a0a'; e.currentTarget.style.borderColor = accentColor; }}
              onMouseLeave={e => { e.currentTarget.style.background = '#0a0a0a'; e.currentTarget.style.color = '#f5f5f0'; e.currentTarget.style.borderColor = '#2a2a2a'; }}>
              <PlayIcon size={11} /> WATCH
            </a>
            <button onClick={onCopy} className="font-mono"
              style={{ background: '#0a0a0a', border: '1px solid #2a2a2a', color: copied ? accentColor : '#f5f5f0', padding: '8px 12px', fontSize: 10, letterSpacing: '0.15em', fontWeight: 700, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6, transition: 'all 0.15s ease' }}
              title="Copy URL">
              {copied ? <React.Fragment><CheckIcon size={11} /> OK</React.Fragment> : <React.Fragment><CopyIcon size={11} /> URL</React.Fragment>}
            </button>
            <button onClick={onToggle} className="font-mono"
              style={{ background: watched ? accentColor : '#0a0a0a', border: `1px solid ${watched ? accentColor : '#2a2a2a'}`, color: watched ? '#0a0a0a' : '#666', padding: '8px 11px', fontSize: 10, letterSpacing: '0.15em', fontWeight: 700, cursor: 'pointer', transition: 'all 0.15s ease' }}
              title={watched ? 'Mark as unwatched' : 'Mark as watched'}>
              {watched ? '✓ DONE' : '○ MARK'}
            </button>
          </div>
        </div>
      );
    }

    // ======= MOUNT =======
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<TrainingLibrary />);
    document.getElementById('loading').classList.add('hidden');
  </script>
</body>
</html>
